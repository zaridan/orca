<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Create Workspace Auto Name Mock</title>
    <style>
      :root {
        --app-font-family: "Geist", -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        --font-mono:
          "SF Mono", SFMono-Regular, ui-monospace, "Cascadia Code", Menlo, Consolas,
          "Liberation Mono", monospace;
        --radius: 10px;
        --background: #fff;
        --foreground: #0a0a0a;
        --card: #fff;
        --muted: #f5f5f5;
        --muted-foreground: #737373;
        --accent: #f5f5f5;
        --accent-foreground: #171717;
        --border: #e5e5e5;
        --input: #e5e5e5;
        --ring: #a1a1a1;
        --primary: #171717;
        --primary-foreground: #fafafa;
        --secondary: #f5f5f5;
        --secondary-foreground: #171717;
        --destructive: #e40014;
      }

      @media (prefers-color-scheme: dark) {
        :root {
          --background: #0a0a0a;
          --foreground: #fafafa;
          --card: #171717;
          --muted: #262626;
          --muted-foreground: #a1a1a1;
          --accent: #404040;
          --accent-foreground: #fafafa;
          --border: rgb(255 255 255 / 0.07);
          --input: rgb(255 255 255 / 0.15);
          --ring: #737373;
          --primary: #e5e5e5;
          --primary-foreground: #171717;
          --secondary: #262626;
          --secondary-foreground: #fafafa;
          --destructive: #ff6568;
        }
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        background: var(--background);
        color: var(--foreground);
        font-family: var(--app-font-family);
        letter-spacing: 0.01em;
        max-width: 100%;
        overflow-x: hidden;
      }

      button,
      input,
      textarea {
        font: inherit;
      }

      .page {
        min-height: 100vh;
        width: 100%;
        display: grid;
        place-items: center;
        padding: 28px;
        overflow-x: hidden;
      }

      .dialog {
        width: min(448px, calc(100vw - 56px));
        min-width: 0;
        border: 1px solid var(--border);
        border-radius: var(--radius);
        background: var(--card);
        box-shadow: 0 10px 24px rgb(0 0 0 / 0.18);
        padding: 18px;
      }

      .title {
        font-size: 16px;
        line-height: 1.25;
        font-weight: 650;
        margin: 0 0 14px;
      }

      .stack {
        display: grid;
        gap: 16px;
        min-width: 0;
      }

      .field {
        display: grid;
        gap: 6px;
        min-width: 0;
      }

      .field-head {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
      }

      label,
      .label {
        color: var(--muted-foreground);
        font-size: 12px;
        font-weight: 550;
      }

      .control {
        min-height: 36px;
        min-width: 0;
        width: 100%;
        border: 1px solid var(--input);
        border-radius: calc(var(--radius) * 0.8);
        background: transparent;
        color: var(--foreground);
        padding: 0 10px;
        outline: none;
      }

      .control:focus,
      .focus-ring:focus-within {
        border-color: var(--ring);
        box-shadow: 0 0 0 3px color-mix(in srgb, var(--ring) 50%, transparent);
      }

      .project-trigger,
      .agent-trigger,
      .source-trigger,
      .selected-source {
        min-height: 36px;
        width: 100%;
        display: flex;
        align-items: center;
        gap: 9px;
        border: 1px solid var(--input);
        border-radius: calc(var(--radius) * 0.8);
        background: transparent;
        color: var(--foreground);
        padding: 0 10px;
        text-align: left;
        cursor: pointer;
      }

      .project-trigger:hover,
      .agent-trigger:hover,
      .source-trigger:hover,
      .selected-source:hover {
        background: var(--accent);
      }

      .project-trigger:focus,
      .agent-trigger:focus,
      .source-trigger:focus,
      .selected-source:focus {
        outline: none;
        border-color: var(--ring);
        box-shadow: 0 0 0 3px color-mix(in srgb, var(--ring) 50%, transparent);
      }

      .icon {
        width: 15px;
        height: 15px;
        flex: 0 0 auto;
        color: var(--muted-foreground);
      }

      .grow {
        min-width: 0;
        flex: 1 1 auto;
      }

      .truncate {
        min-width: 0;
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }

      .muted {
        color: var(--muted-foreground);
      }

      .mono {
        font-family: var(--font-mono);
      }

      .small {
        font-size: 12px;
      }

      .tiny {
        font-size: 11px;
      }

      .source-wrap {
        position: relative;
      }

      .quick-actions {
        display: flex;
        align-items: center;
        flex-wrap: wrap;
        gap: 6px;
        min-width: 0;
        margin-top: -4px;
      }

      .quick-actions-label {
        color: var(--muted-foreground);
        font-size: 11px;
        line-height: 1;
      }

      .action-source-wrap {
        flex: 0 1 auto;
      }

      .quick-action {
        position: relative;
        width: 26px;
        height: 26px;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: transparent;
        color: var(--muted-foreground);
        display: inline-flex;
        justify-content: center;
        align-items: center;
        padding: 0;
        line-height: 1;
        cursor: pointer;
      }

      .quick-action:hover,
      .quick-action:focus {
        outline: none;
        background: var(--accent);
        color: var(--foreground);
        border-color: var(--ring);
      }

      .quick-action .icon {
        width: 14px;
        height: 14px;
      }

      .start-from-trigger {
        width: auto;
        gap: 6px;
        padding: 0 10px;
      }

      .start-from-label {
        font-size: 11px;
        line-height: 1;
      }

      .quick-action::after {
        position: absolute;
        z-index: 30;
        left: 50%;
        bottom: calc(100% + 7px);
        display: none;
        width: max-content;
        max-width: 190px;
        transform: translateX(-50%);
        border: 1px solid var(--border);
        border-radius: 6px;
        background: var(--foreground);
        color: var(--background);
        padding: 5px 7px;
        font-size: 11px;
        line-height: 1;
        white-space: nowrap;
        box-shadow: 0 8px 18px rgb(0 0 0 / 0.16);
        content: attr(data-tooltip);
      }

      .quick-action::before {
        position: absolute;
        z-index: 31;
        left: 50%;
        bottom: calc(100% + 3px);
        display: none;
        width: 7px;
        height: 7px;
        transform: translateX(-50%) rotate(45deg);
        background: var(--foreground);
        content: "";
      }

      .quick-action:focus-visible::after,
      .quick-action:focus-visible::before {
        display: block;
      }

      @media (hover: hover) and (pointer: fine) {
        .quick-action:hover::after,
        .quick-action:hover::before {
          display: block;
        }
      }

      .quick-action[aria-expanded="true"]::after,
      .quick-action[aria-expanded="true"]::before {
        display: none !important;
      }

      .action-source-wrap .popover {
        right: auto;
        width: min(410px, calc(100vw - 56px));
      }

      .attached-context {
        display: flex;
        flex-wrap: wrap;
        gap: 7px;
        min-width: 0;
        margin-top: -8px;
      }

      .issue-pill {
        min-width: 0;
        max-width: 100%;
        height: 26px;
        display: inline-flex;
        align-items: center;
        gap: 6px;
        border: 1px solid var(--border);
        border-radius: 999px;
        background: color-mix(in srgb, var(--muted) 55%, transparent);
        color: var(--foreground);
        padding: 0 4px 0 8px;
        font-size: 11px;
      }

      .pill-dismiss {
        width: 18px;
        height: 18px;
        display: grid;
        place-items: center;
        border: 0;
        border-radius: 999px;
        background: transparent;
        color: var(--muted-foreground);
        cursor: pointer;
      }

      .pill-dismiss:hover {
        background: var(--accent);
        color: var(--foreground);
      }

      .popover {
        position: absolute;
        z-index: 20;
        left: 0;
        right: 0;
        top: calc(100% + 5px);
        display: none;
        max-height: 310px;
        overflow: hidden;
        border: 1px solid var(--border);
        border-radius: calc(var(--radius) * 0.8);
        background: var(--card);
        box-shadow: 0 10px 24px rgb(0 0 0 / 0.18);
      }

      .popover.open {
        display: block;
      }

      .source-search {
        padding: 8px 10px 6px;
        border-bottom: 1px solid var(--border);
      }

      .source-search-input {
        width: 100%;
        height: 30px;
        border: 1px solid var(--input);
        border-radius: 6px;
        background: transparent;
        color: var(--foreground);
        padding: 0 9px;
        font-size: 12px;
        outline: none;
      }

      .source-search-input:focus {
        border-color: var(--ring);
        box-shadow: 0 0 0 3px color-mix(in srgb, var(--ring) 45%, transparent);
      }

      .tabs {
        display: flex;
        gap: 16px;
        border-bottom: 1px solid var(--border);
        padding: 8px 10px 0;
      }

      .tab {
        appearance: none;
        border: 0;
        border-bottom: 1px solid transparent;
        background: transparent;
        color: var(--muted-foreground);
        padding: 0 0 7px;
        font-size: 12px;
        cursor: pointer;
      }

      .tab.active {
        color: var(--foreground);
        border-color: var(--foreground);
      }

      .results {
        max-height: 236px;
        overflow: auto;
        padding: 4px;
      }

      .result {
        width: 100%;
        min-height: 34px;
        display: grid;
        grid-template-columns: 18px minmax(0, 1fr) auto;
        align-items: center;
        gap: 7px;
        border: 1px solid transparent;
        border-radius: 6px;
        background: transparent;
        color: var(--foreground);
        padding: 6px 8px;
        text-align: left;
        cursor: pointer;
      }

      .result:hover,
      .result:focus {
        outline: none;
        border-color: var(--border);
        background: var(--accent);
      }

      .badge {
        border: 1px solid var(--border);
        border-radius: 999px;
        color: var(--muted-foreground);
        font-size: 10px;
        line-height: 1;
        padding: 3px 6px;
      }

      .textarea {
        width: 100%;
        min-height: 82px;
        resize: vertical;
        border: 1px solid var(--input);
        border-radius: calc(var(--radius) * 0.8);
        background: transparent;
        color: var(--foreground);
        padding: 9px 10px;
        outline: none;
      }

      .textarea:focus {
        border-color: var(--ring);
        box-shadow: 0 0 0 3px color-mix(in srgb, var(--ring) 50%, transparent);
      }

      .advanced-toggle {
        appearance: none;
        border: 0;
        background: transparent;
        color: var(--foreground);
        display: inline-flex;
        align-items: center;
        gap: 6px;
        margin-left: -8px;
        padding: 6px 8px;
        border-radius: 6px;
        font-size: 12px;
        cursor: pointer;
      }

      .advanced-toggle:hover {
        background: var(--accent);
      }

      .advanced {
        display: none;
        gap: 15px;
        padding: 2px 4px 4px;
      }

      .advanced.open {
        display: grid;
      }

      .remote-row {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 12px;
        border: 1px solid var(--border);
        border-radius: calc(var(--radius) * 0.8);
        background: color-mix(in srgb, var(--muted) 50%, transparent);
        padding: 8px 10px;
      }

      .switch {
        width: 36px;
        height: 20px;
        border: 0;
        border-radius: 999px;
        background: var(--muted-foreground);
        padding: 2px;
        cursor: pointer;
      }

      .switch span {
        display: block;
        width: 16px;
        height: 16px;
        border-radius: 50%;
        background: var(--background);
        transition: transform 150ms ease;
      }

      .switch.on {
        background: var(--foreground);
      }

      .switch.on span {
        transform: translateX(16px);
      }

      .disabled-note {
        display: none;
        border: 1px solid color-mix(in srgb, var(--destructive) 28%, var(--border));
        border-radius: calc(var(--radius) * 0.8);
        background: color-mix(in srgb, var(--destructive) 8%, transparent);
        color: var(--foreground);
        padding: 8px 10px;
        font-size: 12px;
      }

      .disabled-note.visible {
        display: block;
      }

      .footer {
        display: flex;
        min-width: 0;
        justify-content: flex-end;
        align-items: center;
        gap: 10px;
        padding-top: 2px;
      }

      .button {
        min-height: 32px;
        min-width: 0;
        max-width: 100%;
        border: 1px solid transparent;
        border-radius: calc(var(--radius) * 0.8);
        background: var(--primary);
        color: var(--primary-foreground);
        padding: 0 12px;
        font-size: 12px;
        font-weight: 520;
        display: inline-flex;
        align-items: center;
        gap: 8px;
        cursor: pointer;
      }

      .button:disabled {
        cursor: not-allowed;
        opacity: 0.55;
      }

      .shortcut {
        border: 1px solid color-mix(in srgb, currentColor 20%, transparent);
        border-radius: 5px;
        padding: 2px 5px;
        font-size: 10px;
        line-height: 1;
        opacity: 0.78;
      }

      .clear {
        flex: 0 0 auto;
        width: 24px;
        height: 24px;
        display: grid;
        place-items: center;
        border: 0;
        border-radius: 5px;
        background: transparent;
        color: var(--muted-foreground);
        cursor: pointer;
      }

      .clear:hover {
        background: var(--accent);
        color: var(--foreground);
      }

      .hidden {
        display: none !important;
      }

      @media (max-width: 520px) {
        .page {
          padding: 12px;
          align-items: start;
        }

        .dialog {
          width: calc(100vw - 24px);
          padding: 15px;
        }

        .footer {
          justify-content: stretch;
        }

        .footer .button {
          width: 100%;
          justify-content: center;
        }

        .tabs {
          gap: 12px;
          overflow-x: hidden;
        }

        .action-source-wrap .popover {
          left: -24px;
          width: calc(100vw - 56px);
        }

      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="dialog" aria-labelledby="dialog-title">
        <h1 id="dialog-title" class="title">Create Worktree</h1>
        <div class="stack">
          <div class="field">
            <div class="field-head">
              <label for="project-trigger">Project</label>
              <button class="clear" type="button" aria-label="Add project">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                  <path d="M12 5v14M5 12h14" stroke-width="2" stroke-linecap="round" />
                </svg>
              </button>
            </div>
            <button id="project-trigger" class="project-trigger" type="button">
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M3 7h7l2 2h9v8a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V7z" stroke-width="2" />
              </svg>
              <span class="grow truncate">orca</span>
              <span class="muted">⌄</span>
            </button>
          </div>

          <div id="remote-warning" class="disabled-note" role="status">
            Reconnect this SSH target before attaching an issue or creating a worktree.
          </div>

          <div class="field">
            <div class="field-head">
              <label for="agent-trigger">Agent</label>
              <button class="clear" type="button" aria-label="Configure agents">
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                  <path d="M12 8a4 4 0 1 0 0 8 4 4 0 0 0 0-8z" stroke-width="2" />
                  <path d="M3 12h3M18 12h3M12 3v3M12 18v3" stroke-width="2" stroke-linecap="round" />
                </svg>
              </button>
            </div>
            <button id="agent-trigger" class="agent-trigger" type="button">
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M4 6h16M4 12h10M4 18h16" stroke-width="2" stroke-linecap="round" />
              </svg>
              <span class="grow truncate">Codex</span>
              <span class="muted">⌄</span>
            </button>
          </div>

          <div class="quick-actions" aria-label="Optional workspace details">
            <span class="quick-actions-label">Or:</span>
            <div class="source-wrap action-source-wrap">
              <button
                id="source-trigger"
                class="quick-action start-from-trigger"
                type="button"
                aria-label="Start from an issue, PR, or branch"
                aria-controls="source-popover"
                aria-expanded="false"
                data-tooltip="Start from an issue, PR, or branch"
                title="Start from an issue, PR, or branch"
              >
                <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                  <path
                    d="M5 12h14M13 6l6 6-6 6"
                    stroke-width="2"
                    stroke-linecap="round"
                    stroke-linejoin="round"
                  />
                </svg>
                <span class="start-from-label">Start from…</span>
              </button>

              <div id="source-popover" class="popover" role="listbox">
                <div class="source-search">
                  <input
                    id="source-search-input"
                    class="source-search-input"
                    type="search"
                    placeholder="Search issues, PRs, branches"
                    aria-label="Search issues, PRs, branches"
                  />
                </div>
                <div class="tabs" aria-label="Source type">
                  <button class="tab active" type="button" data-tab="all">All</button>
                  <button class="tab" type="button" data-tab="issues">Issues</button>
                  <button class="tab" type="button" data-tab="prs">PRs</button>
                  <button class="tab" type="button" data-tab="branches">Branches</button>
                </div>
                <div class="results">
                  <button class="result" type="button" data-source="ENG-342 Automatic workspace naming">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                      <circle cx="12" cy="12" r="8" stroke-width="2" />
                    </svg>
                    <span class="truncate"><strong>ENG-342</strong> Automatic workspace naming</span>
                    <span class="badge">Issue</span>
                  </button>
                  <button class="result" type="button" data-source="#4821 Fix workspace naming">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                      <path
                        d="M6 3v12M18 9v12M6 15a6 6 0 0 0 6 6h6M18 9a6 6 0 0 0-6-6H6"
                        stroke-width="2"
                      />
                    </svg>
                    <span class="truncate"><strong>#4821</strong> Fix workspace naming</span>
                    <span class="badge">PR</span>
                  </button>
                  <button class="result" type="button" data-source="AUTH-118 OAuth callback timeout">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                      <circle cx="12" cy="12" r="8" stroke-width="2" />
                    </svg>
                    <span class="truncate"><strong>AUTH-118</strong> OAuth callback timeout</span>
                    <span class="badge">Issue</span>
                  </button>
                  <button class="result" type="button" data-source="origin/feature/start-from-selector">
                    <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                      <path d="M6 3v18M6 7h9a3 3 0 0 1 0 6H6" stroke-width="2" />
                    </svg>
                    <span class="truncate mono">origin/feature/start-from-selector</span>
                    <span class="badge">Branch</span>
                  </button>
                </div>
              </div>
            </div>

            <button
              id="name-button"
              class="quick-action"
              type="button"
              aria-label="Set a custom name"
              data-tooltip="Set a custom name"
              title="Set a custom name"
            >
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <path d="M4 7V4h16v3M9 20h6M12 4v16" stroke-width="2" stroke-linecap="round" />
              </svg>
            </button>
          </div>

          <div id="attached-context" class="attached-context hidden">
            <div id="selected-source" class="issue-pill" tabindex="0">
              <svg class="icon" viewBox="0 0 24 24" fill="none" stroke="currentColor">
                <circle cx="12" cy="12" r="8" stroke-width="2" />
              </svg>
              <span id="selected-source-label" class="truncate">ENG-342 Automatic workspace naming</span>
              <button
                id="clear-source"
                class="pill-dismiss"
                type="button"
                aria-label="Remove attached issue"
              >
                ×
              </button>
            </div>
          </div>

          <button id="advanced-toggle" class="advanced-toggle" type="button" aria-expanded="false">
            <span>Advanced</span>
            <span id="advanced-chevron">⌄</span>
          </button>

          <div id="advanced" class="advanced">
            <div class="field">
              <label for="manual-name">Manual workspace name</label>
              <input
                id="manual-name"
                class="control"
                type="text"
                placeholder="Leave blank for automatic naming"
              />
              <div class="tiny muted">Typing here uses a fixed workspace name for this worktree.</div>
            </div>

            <div class="field">
              <label for="start-from">Start from</label>
              <input id="start-from" class="control mono" type="text" value="origin/main" />
            </div>

            <div class="remote-row">
              <div class="grow">
                <div class="small">Simulate SSH disconnected</div>
                <div class="tiny muted">Shows the remote latency and reconnect gate state.</div>
              </div>
              <button id="remote-toggle" class="switch" type="button" aria-pressed="false">
                <span></span>
              </button>
            </div>
          </div>

          <div class="footer">
            <button id="create-button" class="button" type="button">
              <span>Create Worktree</span>
              <span id="shortcut" class="shortcut">⌘↵</span>
            </button>
          </div>
        </div>
      </section>
    </main>

    <script>
      const isMac = navigator.userAgent.includes("Mac")
      document.getElementById("shortcut").textContent = isMac ? "⌘↵" : "Ctrl+↵"

      const sourceTrigger = document.getElementById("source-trigger")
      const popover = document.getElementById("source-popover")
      const attachedContext = document.getElementById("attached-context")
      const selectedSource = document.getElementById("selected-source")
      const selectedLabel = document.getElementById("selected-source-label")
      const clearSource = document.getElementById("clear-source")
      const nameButton = document.getElementById("name-button")
      const advancedToggle = document.getElementById("advanced-toggle")
      const advanced = document.getElementById("advanced")
      const chevron = document.getElementById("advanced-chevron")
      const remoteToggle = document.getElementById("remote-toggle")
      const remoteWarning = document.getElementById("remote-warning")
      const createButton = document.getElementById("create-button")
      const manualName = document.getElementById("manual-name")
      const startFrom = document.getElementById("start-from")

      function setPopover(open) {
        popover.classList.toggle("open", open)
        sourceTrigger.setAttribute("aria-expanded", String(open))
      }

      function toggleSourcePopover() {
        if (sourceTrigger.disabled) return
        setPopover(!popover.classList.contains("open"))
      }

      sourceTrigger.addEventListener("click", toggleSourcePopover)

      document.querySelectorAll(".result").forEach((button) => {
        button.addEventListener("click", () => {
          const label = button.dataset.source
          selectedLabel.textContent = label
          attachedContext.classList.remove("hidden")
          setPopover(false)
        })
      })

      clearSource.addEventListener("click", (event) => {
        event.stopPropagation()
        attachedContext.classList.add("hidden")
      })

      selectedSource.addEventListener("click", () => setPopover(true))

      document.querySelectorAll(".tab").forEach((tab) => {
        tab.addEventListener("click", () => {
          document.querySelectorAll(".tab").forEach((item) => item.classList.remove("active"))
          tab.classList.add("active")
        })
      })

      advancedToggle.addEventListener("click", () => {
        const next = !advanced.classList.contains("open")
        advanced.classList.toggle("open", next)
        advancedToggle.setAttribute("aria-expanded", String(next))
        chevron.textContent = next ? "⌃" : "⌄"
      })

      function openAdvancedAndFocus(element) {
        advanced.classList.add("open")
        advancedToggle.setAttribute("aria-expanded", "true")
        chevron.textContent = "⌃"
        window.requestAnimationFrame(() => element.focus())
      }

      nameButton.addEventListener("click", () => openAdvancedAndFocus(manualName))

      remoteToggle.addEventListener("click", () => {
        const next = !remoteToggle.classList.contains("on")
        remoteToggle.classList.toggle("on", next)
        remoteToggle.setAttribute("aria-pressed", String(next))
        remoteWarning.classList.toggle("visible", next)
        sourceTrigger.disabled = next
        createButton.disabled = next
        if (next) setPopover(false)
      })

      document.addEventListener("keydown", (event) => {
        if (event.key === "Escape") setPopover(false)
      })

      document.addEventListener("click", (event) => {
        if (!event.target.closest(".source-wrap")) setPopover(false)
      })
    </script>
  </body>
</html>
